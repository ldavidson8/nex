server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is the magic line for SvelteKit:
        # 1. Look for the exact file ($uri)
        # 2. Look for the file with .html appended ($uri.html)
        # 3. Look for a directory with an index.html ($uri/)
        # 4. Fall back to the 404 page
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Optional: Cache static assets (fonts, images, etc.)
    location /_app/immuteable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
